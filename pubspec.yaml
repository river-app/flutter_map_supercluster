name: flutter_map_supercluster
description: Very fast Marker clustering for flutter_map. Supports efficient adding/removing of Markers.
version: 5.0.0-dev.1
publish_to: none
homepage: https://github.com/rorystephenson/flutter_map_supercluster
topics:
  - flutter-map
  - cluster

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter_map_marker_popup: ^8.1.0
  async: ^2.13.1
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_map: ^8.3.1
  latlong2: ^0.10.1
  provider: ^6.1.5+1
  supercluster: ^3.2.0

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
